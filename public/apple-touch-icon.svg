<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Fond blanc — requis pour icône iPhone propre -->
  <rect width="180" height="180" fill="#ffffff" rx="40"/>

  <defs>
    <mask id="cut">
      <rect width="180" height="180" fill="white"/>
      <ellipse cx="69" cy="80" rx="24" ry="23" fill="black"/>
      <ellipse cx="111" cy="100" rx="24" ry="23" fill="black"/>
    </mask>
  </defs>

  <!-- Logo Momentum centré, fond blanc -->
  <ellipse cx="64" cy="82" rx="45" ry="25"
           transform="rotate(-18 64 82)"
           fill="#0057FF" mask="url(#cut)"/>
  <ellipse cx="116" cy="98" rx="45" ry="25"
           transform="rotate(-18 116 98)"
           fill="#0057FF" mask="url(#cut)"/>
</svg>
