<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond bleu foncé -->
  <rect width="64" height="64" rx="14" fill="#0D1B3E"/>

  <!-- Deux pilules entrelacées (reproduction du logo Momentum) -->
  <!-- Pilule du haut (gauche → droite, inclinée) -->
  <g transform="translate(32,27) rotate(-25)">
    <rect x="-18" y="-6" width="36" height="12" rx="6" fill="white"/>
  </g>
  <!-- Masque central pour créer l'entrelacement -->
  <g transform="translate(32,37) rotate(-25)">
    <rect x="-18" y="-6" width="36" height="12" rx="6" fill="white"/>
  </g>
  <!-- Cache central pour l'effet de tressage -->
  <ellipse cx="32" cy="32" rx="7" ry="7" fill="#0D1B3E"/>
</svg>
